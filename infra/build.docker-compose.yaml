services:
  fastapi:
    image: kamikadze24/fastapi:${TAG}

    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        IS_DEBUG: ${IS_DEBUG:-true} # Default to 'true' if not set

  frontend-builder:
    image: kamikadze24/frontendbuilder:${TAG}
    build:
      context: ..
      dockerfile: frontend/Dockerfile_next_builder
    command: sh -c "npm run build" # Build Vite static bundle into frontend/out
    restart: "no"

  postgres:
    image: kamikadze24/postgres-walg:${TAG}
    build:
      context: ./postgres

  backup:
    image: kamikadze24/nuspace-backup:${TAG}
    build:
      context: ./backup
